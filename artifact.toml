kind = "mobile"
previewPath = "/"
title = "Neon Shark Runner"
version = "1.0.0"
id = "artifacts/neon-shark-runner"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20795

[services.development]
run = "pnpm --filter @workspace/neon-shark-runner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neon-shark-runner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/neon-shark-runner", "run", "serve" ]

[services.env]
PORT = "20795"
BASE_PATH = "/"
